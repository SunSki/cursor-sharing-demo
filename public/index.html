<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursor Sharing — リアルタイムカーソル共有</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #060610;
      overflow: hidden;
      cursor: none;
      user-select: none;
      width: 100vw;
      height: 100vh;
    }

    /* Fixed-size canvas — CSS transform scales it to fit any screen */
    #canvas {
      position: absolute;
      width: 1440px;
      height: 900px;
      transform-origin: top left;
      background: #0a0a12;
      overflow: hidden;
    }

    #canvas::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Cursors live inside #canvas so they scale with it */
    #my-cursor,
    .remote-cursor {
      position: absolute;
      pointer-events: none;
    }

    #my-cursor {
      z-index: 1000;
    }
    #my-cursor .ring {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid white;
      position: absolute;
      transform: translate(-50%, -50%);
    }
    #my-cursor .dot {
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
      position: absolute;
      transform: translate(-50%, -50%);
    }

    .remote-cursor {
      z-index: 999;
      transform: translate(-8px, -8px);
      transition: left 0.07s linear, top 0.07s linear;
    }
    .remote-cursor .glow {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      position: absolute;
      transform: translate(-8px, -8px);
      opacity: 0.25;
      filter: blur(8px);
    }
    .remote-cursor .dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      position: absolute;
    }
    .remote-cursor .label {
      position: absolute;
      top: 20px;
      left: 4px;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
      color: #000;
      letter-spacing: 0.3px;
    }

    /* HUD content */
    .hud {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    }

    .title {
      font-size: 3.6rem;
      font-weight: 800;
      text-align: center;
      background: linear-gradient(135deg, #6366f1, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
    }

    .subtitle {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.38);
      text-align: center;
    }

    .panel {
      display: flex;
      gap: 16px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 14px;
      padding: 18px 26px;
      text-align: center;
    }

    .card-value {
      font-size: 1.9rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 6px;
    }

    .card-label {
      font-size: 0.68rem;
      color: rgba(255,255,255,0.38);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .pos-value {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 1.1rem;
      color: #a78bfa;
    }

    .online-dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      background: #22c55e;
      border-radius: 50%;
      margin-right: 6px;
      animation: blink 2s infinite;
      vertical-align: middle;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .share-btn {
      cursor: none;
      background: rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.35);
      color: rgba(255,255,255,0.6);
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 0.82rem;
      font-family: inherit;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    .share-btn:hover {
      background: rgba(99,102,241,0.22);
      border-color: rgba(99,102,241,0.6);
      color: #fff;
    }

    .share-btn .url {
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: #818cf8;
    }

    .badge {
      position: absolute;
      bottom: 20px;
      right: 20px;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.2);
      font-family: monospace;
    }
  </style>
</head>
<body>

<div id="canvas">
  <div id="my-cursor">
    <div class="ring"></div>
    <div class="dot"></div>
  </div>

  <div class="hud">
    <div>
      <h1 class="title">Cursor Sharing</h1>
      <p class="subtitle" style="margin-top:10px">URLを共有して、お互いのカーソルをリアルタイムで確認できます</p>
    </div>

    <div class="panel">
      <div class="card">
        <div class="card-value">
          <span class="online-dot"></span><span id="user-count">—</span>
        </div>
        <div class="card-label">オンライン</div>
      </div>
      <div class="card">
        <div class="card-value pos-value" id="my-pos">—</div>
        <div class="card-label">あなたの座標</div>
      </div>
    </div>

    <button class="share-btn" id="share-btn" onclick="copyUrl()">
      URLをコピー: <span class="url" id="url-display"></span>
    </button>
  </div>

  <div class="badge">Socket.io + Node.js</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const CANVAS_W = 1440;
  const CANVAS_H = 900;

  const canvasEl  = document.getElementById('canvas');
  const myCursorEl  = document.getElementById('my-cursor');
  const myPosEl     = document.getElementById('my-pos');
  const userCountEl = document.getElementById('user-count');
  const urlDisplay  = document.getElementById('url-display');

  // Scale canvas to fit viewport
  let scale = 1;
  function updateScale() {
    scale = Math.min(window.innerWidth / CANVAS_W, window.innerHeight / CANVAS_H);
    const offsetX = (window.innerWidth  - CANVAS_W * scale) / 2;
    const offsetY = (window.innerHeight - CANVAS_H * scale) / 2;
    canvasEl.style.transform = `scale(${scale})`;
    canvasEl.style.left = offsetX + 'px';
    canvasEl.style.top  = offsetY + 'px';
  }
  updateScale();
  window.addEventListener('resize', updateScale);

  // Identity
  const COLORS = [
    '#f43f5e','#f97316','#eab308','#22c55e',
    '#06b6d4','#6366f1','#a855f7','#ec4899'
  ];
  const myColor = COLORS[Math.floor(Math.random() * COLORS.length)];
  const myName  = Math.random().toString(36).slice(2, 6).toUpperCase();

  myCursorEl.querySelector('.ring').style.borderColor = myColor;
  myCursorEl.querySelector('.dot').style.background   = myColor;

  urlDisplay.textContent = window.location.href;

  function copyUrl() {
    navigator.clipboard.writeText(window.location.href).then(() => {
      const btn = document.getElementById('share-btn');
      btn.innerHTML = '✓ コピーしました！';
      setTimeout(() => {
        btn.innerHTML = 'URLをコピー: <span class="url">' + window.location.href + '</span>';
      }, 2000);
    });
  }

  // Socket
  const socket = io();
  const remoteCursors = {};
  let lastSent = 0;

  document.addEventListener('mousemove', (e) => {
    // Convert viewport coords → canvas coords
    const rect = canvasEl.getBoundingClientRect();
    const cx = (e.clientX - rect.left) / scale;
    const cy = (e.clientY - rect.top)  / scale;

    // Ignore if outside canvas
    if (cx < 0 || cx > CANVAS_W || cy < 0 || cy > CANVAS_H) return;

    myCursorEl.style.left = cx + 'px';
    myCursorEl.style.top  = cy + 'px';
    myPosEl.textContent   = `${Math.round(cx)}, ${Math.round(cy)}`;

    const now = Date.now();
    if (now - lastSent > 32) {
      lastSent = now;
      socket.emit('cursor', { x: cx, y: cy, color: myColor, name: myName });
    }
  });

  document.addEventListener('mouseleave', () => socket.emit('cursor-leave'));

  socket.on('cursor', ({ id, x, y, color, name }) => {
    if (!remoteCursors[id]) {
      const el = document.createElement('div');
      el.className = 'remote-cursor';
      el.innerHTML =
        `<div class="glow" style="background:${color}"></div>` +
        `<div class="dot" style="background:${color}"></div>` +
        `<div class="label" style="background:${color}">${name}</div>`;
      canvasEl.appendChild(el);
      remoteCursors[id] = el;
    }
    // x, y are canvas coordinates — place directly
    remoteCursors[id].style.left = x + 'px';
    remoteCursors[id].style.top  = y + 'px';
  });

  function removeCursor(id) {
    if (remoteCursors[id]) {
      remoteCursors[id].remove();
      delete remoteCursors[id];
    }
  }

  socket.on('cursor-leave', ({ id }) => removeCursor(id));
  socket.on('user-left',    ({ id }) => removeCursor(id));
  socket.on('user-count',   (count) => { userCountEl.textContent = count; });
</script>
</body>
</html>
